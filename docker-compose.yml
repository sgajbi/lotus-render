services:
  lotus-render:
    build: .
    ports:
      - "8310:8310"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8310/health/ready')"]
      interval: 15s
      timeout: 3s
      retries: 10
